name: Sync Upstream

on:
  schedule:
    - cron: "17 3 * * 1"  # Weekly on Monday at 3:17 AM UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/donmerendolo/readwise-to-remarkable.git
          git fetch upstream master

      - name: Merge upstream
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # We install deps via uv from pyproject.toml + uv.lock; requirements.txt
          # is upstream-managed and not used here. If upstream modified it after
          # we deleted it, resolve the modify/delete conflict by keeping it deleted.
          if ! git merge upstream/master --no-edit; then
            if git status --porcelain | grep -q "^DU requirements.txt"; then
              echo "Auto-resolving requirements.txt as deleted (replaced by uv)"
              git rm requirements.txt
              git commit --no-edit
            else
              echo "::warning::Merge conflict detected - manual resolution needed"
              git merge --abort
              exit 1
            fi
          fi

      - name: Push
        run: git push origin master
